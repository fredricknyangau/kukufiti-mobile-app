name: Build & Release APK

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Release Flutter APK
    runs-on: ubuntu-latest

    steps:
      # ─── 1. CHECKOUT ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── 2. JAVA ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── 3. FLUTTER ─────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # ─── 4. CACHE PUB PACKAGES ──────────────────────────────────────
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ─── 5. INSTALL DEPENDENCIES ────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ─── 6. ANALYZE CODE ────────────────────────────────────────────
      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      # ─── 7. RUN TESTS ───────────────────────────────────────────────
      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          flutter pub global activate coverage
          flutter test --coverage
        continue-on-error: true

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          flags: mobile
        continue-on-error: true

      # ─── 8. DECODE SECRETS ──────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/kukufiti-release.jks

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode \
            > android/app/google-services.json

      # ─── 9. BUILD RELEASE APK ───────────────────────────────────────
      - name: Build release APK
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PATH:           kukufiti-release.jks
        run: flutter build apk --release --dart-define=API_URL=${{ secrets.API_URL }}

      # ─── 9b. EXTRACT VERSION FROM PUBSPEC ───────────────────────────
      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ─── 10. RENAME APK ─────────────────────────────────────────────
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/kukufiti-v${{ steps.version.outputs.version }}.apk

      # ─── 11. GENERATE CHANGELOG ─────────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          CHANGES=$(git log -5 --pretty=format:"- %s (%an)" 2>/dev/null \
                    || echo "- Initial release")
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES"     >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT

      # ─── 12. FIREBASE APP DISTRIBUTION ──────────────────────────────
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: build/app/outputs/flutter-apk/kukufiti-v${{ steps.version.outputs.version }}.apk
          releaseNotes: |
            Build ${{ github.run_number }} — ${{ github.ref_name }}
            Commit: ${{ github.sha }}

      # ─── 13. CREATE GITHUB RELEASE ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "KukuFiti v${{ steps.version.outputs.version }}"
          body: |
            ## KukuFiti Build v${{ steps.version.outputs.version }}

            | Field | Value |
            |---|---|
            | Branch | `${{ github.ref_name }}` |
            | Commit | `${{ github.sha }}` |
            | Build | `#${{ github.run_number }}` |
            | Built at | `${{ github.event.head_commit.timestamp }}` |

            ## Recent Changes
            ${{ steps.changelog.outputs.changes }}

            ## How to Install
            1. Download `kukufiti-v${{ steps.version.outputs.version }}.apk` below
            2. On your Android phone: **Settings → Security → Install unknown apps** → Enable
            3. Open the downloaded APK file and tap **Install**

            > ⚠️ If prompted "Play Protect blocked the install", tap **Install anyway**
          files: build/app/outputs/flutter-apk/kukufiti-v${{ steps.version.outputs.version }}.apk
          prerelease: ${{ github.ref_name != 'main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── 14. CLEANUP OLD PRE-RELEASES ───────────────────────────────
      - name: Delete old develop pre-releases
        if: github.ref_name == 'develop'
        uses: dev-drprasad/delete-older-releases@v0.3.0
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
