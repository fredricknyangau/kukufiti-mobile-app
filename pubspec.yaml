name: mobile
description: "KukuFiti - Modern Poultry Management"
publish_to: 'none'
version: 1.2.6+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  dio: ^5.9.2
  image_picker: ^1.0.7
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.0.2
  lucide_icons: ^0.257.0
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  dartz: ^0.10.1
  uuid: ^4.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  local_auth: ^2.3.0
  path_provider: ^2.1.5
  pdf: ^3.11.1
  printing: ^5.13.2
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  http: ^1.6.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  smooth_page_indicator: ^2.0.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2
  flutter_animate: ^4.5.2
  record: ^6.2.0
  audioplayers: ^6.6.0
  path: ^1.9.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/chicken_logo.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/chicken_logo.jpeg
    - assets/images/hero_image.jpg
    - assets/images/dashboard_overview.png
